<div class="card">
    <div class="card-header fw-bold">
        {{ titulo }}
    </div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
            <tr>
                @for (col of columnas; track col) {
                    <th>{{ col }}</th>
                }
            </tr>
            </thead>
            <tbody>
                @for (fila of datos; track fila) {
                    <tr>
                        @for (col of columnas; track col) {
                            <td>
                                @if (col === 'Estado') {
                                    <span class="badge" [ngClass]="{
                    'bg-success': fila[col] === 'ENTREGADO',
                    'bg-warning text-dark': fila[col] === 'PENDIENTE',
                    'bg-info': fila[col] === 'CONFIRMADO',
                    'bg-primary': fila[col] === 'EN_PREPARACION',
                    'bg-secondary': fila[col] === 'ENVIADO',
                    'bg-danger': fila[col] === 'CANCELADO'
                  }">{{ fila[col] }}</span>
                                } @else {
                                    {{ fila[col] }}
                                }
                            </td>
                        }
                    </tr>
                } @empty {
                    <tr>
                        <td [attr.colspan]="columnas.length" class="text-center text-muted py-4">
                            No hay datos disponibles
                        </td>
                    </tr>
                }
            </tbody>
        </table>
    </div>
</div>
