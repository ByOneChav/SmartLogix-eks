<div class="login-wrapper d-flex align-items-center justify-content-center vh-100">
    <div class="login-box card shadow-lg rounded-3 border-0">

        <div class="card-header text-center texto-principal py-4">
            <h3 class="mb-1 fw-bold">SmartLogix</h3>
            <small class="texto-principal-50">Logística inteligente para eCommerce</small>
        </div>

        <div class="card-body p-4 texto-principal">
            <h5 class="mb-3">Iniciar sesión</h5>

            @if (error) {
            <div class="alert alert-danger py-2">
                {{ error }}
            </div>
            }

            <form (ngSubmit)="login()">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" id="email" [(ngModel)]="email" name="email"
                        placeholder="usuario@smartlogix.cl" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" [(ngModel)]="password" name="password"
                        placeholder="••••••••" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Recordarme</label>
                    </div>
                    <a href="#" class="text-decoration-none small">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-success w-100" [disabled]="loading || !email || !password">
                    {{ loading ? 'Ingresando...' : 'Ingresar' }}
                </button>

                <div class="text-center mt-3">
                    <small class="texto-principal-50">
                        ¿No tienes una cuenta?
                        <a routerLink="/register" class="text-decoration-none">
                            Crear cuenta nueva
                        </a>
                    </small>
                </div>
            </form>

        </div>



        <div class="card-footer text-center py-3 texto-principal">
            <small class="texto-principal-50">SmartLogix v1.0 — Duoc UC 2026</small>
        </div>

    </div>
</div>
