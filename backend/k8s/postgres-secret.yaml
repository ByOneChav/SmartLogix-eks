#Secret = objeto de K8s para guardar datos sensibles ( contraseñas, tokens )
# Los valores van en base64 (NO es cifrado, es codificación)
#Paso 1
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret  # nombre para referenciarlo desde otros manifiestos
type: Opaque            # tipo generico ( hay otros tls, docker-registry )
data:
  POSTGRES_USER: cG9zdGdyZXM= # "postgres" en base64
  POSTGRES_PASSWORD: c21hcnRsb2dpeA== # "smartlogix" en base64
#No es seguridad, es formato. K8s exige que los valores en data estén en base64. Para generarlos


