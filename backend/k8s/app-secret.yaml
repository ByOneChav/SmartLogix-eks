apiVersion: v1
kind: Secret                    # Almacena información sensible (passwords, claves, tokens)
metadata:
  name: app-secret               # Nombre del Secret. Se referencia desde los Deployments con secretKeyRef.name
type: Opaque                     # Tipo genérico: pares clave-valor definidos por el usuario
data:                             # Los valores van en Base64 (¡OJO! Base64 NO es encriptación, es solo codificación)
  DB_PASSWORD: c21hcnRsb2dpeA==   # Base64 de "smartlogix" → contraseña de la base de datos
  JWT_SECRET: bXktc3VwZXItc2VjcmV0LWtleS10aGF0LWlzLXZlcnktbG9uZy0xMjM0NTY=
                                  # Base64 de "my-super-secret-key-that-is-very-long-123456"
                                  # clave que msvc-auth usa para firmar los JWT