apiVersion: v1
kind: ConfigMap
# Un ConfigMap guarda configuración NO sensible, en texto plano.
# "default.conf" abajo se convierte en el archivo /etc/nginx/conf.d/default.conf
# dentro del Pod del frontend (ver frontend-deployment.yaml -> volumeMounts)
metadata:
  name: frontend-nginx-config
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Todo lo que empiece con /api/ se reenvía al Gateway interno
        location /api/ {
            proxy_pass http://msvc-gateway:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Fallback para Angular (SPA): cualquier ruta no encontrada -> index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }