spring:
  cloud:
    gateway:
      routes:
        - id: authService
          uri: http://msvc-auth:8081
          predicates:
            - Path=/api/auth/**
        - id: pedido
          uri: http://msvc-pedido:8082
          predicates:
            - Path=/api/pedido/**
        - id: inventario
          uri: http://msvc-inventario:8083
          predicates:
            - Path=/api/inventario/**
        - id: envio
          uri: http://msvc-envio:8084
          predicates:
            - Path=/api/envio/**

eureka:
  client:
    register-with-eureka: true
    service-url:
      defaultZone: http://msvc-eureka:8761/eureka

app:
  cors:
    allowed-origins: "*"
    
# agregue eso
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth
        url: /api/auth/v3/api-docs

      - name: Pedido
        url: /api/pedido/v3/api-docs

      - name: Inventario
        url: /api/inventario/v3/api-docs

      - name: Envio
        url: /api/envio/v3/api-docs