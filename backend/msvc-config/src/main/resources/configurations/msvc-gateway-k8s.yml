spring:
  cloud:
    gateway:
      routes:
        # ── Rutas existentes ──────────────────────────────
        - id: authService
          uri: http://msvc-auth:8081
          predicates:
            - Path=/api/auth/**

        - id: pedido
          uri: http://msvc-pedido:8082
          predicates:
            - Path=/api/pedido/**

        - id: inventario
          uri: http://msvc-inventario:8083
          predicates:
            - Path=/api/inventario/**

        - id: envio
          uri: http://msvc-envio:8084
          predicates:
            - Path=/api/envio/**

        # ── Swagger por microservicio ─────────────────────
        - id: swagger-auth
          uri: http://msvc-auth:8081
          predicates:
            - Path=/swagger/auth/**
          filters:
            - StripPrefix=2

        - id: swagger-inventario
          uri: http://msvc-inventario:8083
          predicates:
            - Path=/swagger/inventario/**
          filters:
            - StripPrefix=2

        - id: swagger-pedido
          uri: http://msvc-pedido:8082
          predicates:
            - Path=/swagger/pedido/**
          filters:
            - StripPrefix=2

        - id: swagger-envio
          uri: http://msvc-envio:8084
          predicates:
            - Path=/swagger/envio/**
          filters:
            - StripPrefix=2

# ... resto igual (eureka, app.cors)

eureka:
  client:
    register-with-eureka: true
    service-url:
      defaultZone: http://msvc-eureka:8761/eureka

app:
  cors:
    allowed-origins: "*"

