spring:
  datasource:
    url: jdbc:postgresql://${DATA_IP}:5432/authdb
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

eureka:
  client:
    service-url:
      defaultZone: http://<IP-EC2-EUREKA>:8761/eureka

app:
  cors:
    allowed-origins: http://ec2-3-208-13-183.compute-1.amazonaws.com